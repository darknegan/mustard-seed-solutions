<section id="contact" class="cta mss-section" aria-labelledby="cta-heading">
  <div class="mss-container">
    <div class="cta__card">
      <div class="cta__glow cta__glow--a" aria-hidden="true"></div>
      <div class="cta__glow cta__glow--b" aria-hidden="true"></div>

      <div class="cta__content">
        <span class="mss-eyebrow cta__eyebrow">Ready when you are</span>
        <h2 id="cta-heading" class="mss-display-lg cta__heading">
          Let&rsquo;s build something that <span class="cta__heading-accent">earns trust</span> from the first click.
        </h2>
        <p class="mss-body-lg cta__lede">
          Free 20-minute conversation. No sales tricks, no pressure — just a clear next step for your
          business. If you already have a site, I&rsquo;ll give you straight, honest feedback.
        </p>

        <div class="cta__actions">
          <p-button
            label="Book a free consult"
            icon="pi pi-calendar"
            iconPos="left"
            size="large"
            styleClass="mss-btn-primary"
            [rounded]="true"
          />
          <p-button
            label="Email hello@mustardseed.solutions"
            size="large"
            styleClass="mss-btn-on-brand"
            [rounded]="true"
          />
        </div>

        <p class="cta__note">
          <i class="pi pi-clock" aria-hidden="true"></i>
          Usually responds within 1 business day.
        </p>
      </div>
    </div>
  </div>
</section>
