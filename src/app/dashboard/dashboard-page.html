<section class="dashboard" aria-labelledby="dashboard-heading">
  <aside class="dashboard__sidebar" aria-label="Client portal navigation">
    <div class="dashboard__sidebar-glow" aria-hidden="true"></div>
    <a class="dashboard__brand" href="/" aria-label="Mustard Seed Solutions home">
      <span class="dashboard__brand-mark" aria-hidden="true"></span>
      <span>
        <strong>Mustard Seed</strong>
        <small>Client portal</small>
      </span>
    </a>

    <nav class="dashboard__nav" aria-label="Dashboard">
      <p class="dashboard__nav-label">Menu</p>
      @for (item of navItems; track item.route) {
        <a
          class="dashboard__nav-link"
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        >
          <span class="dashboard__nav-icon" [attr.data-icon]="item.icon" aria-hidden="true"></span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="dashboard__account">
      <div class="dashboard__avatar" aria-hidden="true">AC</div>
      <div class="dashboard__account-meta">
        <strong>AdventureCon</strong>
        <span>Your site</span>
      </div>
      <button type="button" class="dashboard__sign-out" (click)="signOut()">Sign out</button>
    </div>
  </aside>

  <div class="dashboard__mobile-top">
    <a class="dashboard__mobile-brand" href="/" aria-label="Mustard Seed Solutions home">
      <span class="dashboard__brand-mark" aria-hidden="true"></span>
      <strong>Mustard Seed</strong>
    </a>
    <button type="button" class="dashboard__menu" aria-label="Open dashboard menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <main class="dashboard__main">
    <div class="dashboard__main-atmosphere" aria-hidden="true"></div>
    <header class="dashboard__header">
      <div class="dashboard__header-left">
        <div class="dashboard__header-titles">
          <h1 id="dashboard-heading">{{ pageTitle() }}</h1>
          <p class="dashboard__header-greeting">{{ greeting() }}</p>
        </div>
        <span class="dashboard__site-pill">
          <span class="dashboard__site-pulse" aria-hidden="true"></span>
          adventurecon.com
        </span>
      </div>
    </header>

    <div class="dashboard__scroll">
      <router-outlet />
    </div>
  </main>

  <nav class="dashboard__tabbar" aria-label="Dashboard tabs">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        <span class="dashboard__tab-icon" [attr.data-icon]="item.icon" aria-hidden="true"></span>
        <small>{{ item.shortLabel }}</small>
      </a>
    }
  </nav>
</section>
